<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="#2E2A27" stroke="#B9975B" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#B9975B" stroke-width="0.6" stroke-dasharray="2 3"/>
  <!-- K letterform -->
  <text x="14" y="42" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#B9975B" letter-spacing="-1">K</text>
  <!-- & separator -->
  <text x="28.5" y="38" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#C6A75E" opacity="0.9">&amp;</text>
  <!-- H letterform -->
  <text x="36" y="42" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#B9975B" letter-spacing="-1">H</text>
</svg>
